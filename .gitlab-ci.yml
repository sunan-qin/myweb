# GitLab CI/CD configuration for Pages deployment
pages:
  stage: deploy
  script:
    - python -m pip install --upgrade pip -i https://mirrors.aliyun.com/pypi/simple/
    - pip install sphinx myst-parser -i https://mirrors.aliyun.com/pypi/simple/
    - sphinx-build -b html source build/html
    - mkdir -p public
    - cp -r build/html/* public/
    - ls -la public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
